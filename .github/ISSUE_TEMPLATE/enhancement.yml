name: Enhancement
description: Suggest a new feature or improvement
title: "[Enhancement]: "
labels: ["enhancement"]
assignees:
  - mwwoda
  - arjankowski
  - lukaszsocha2
  - bartlomiejleszczynski
  - congminh1254
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: Describe the feature you'd like to add...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature help you? What problem does it solve?
      placeholder: I need this feature because...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information, examples, or screenshots
      placeholder: Any additional details...
    validations:
      required: false
